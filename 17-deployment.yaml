apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    project: roboshop
    tier: frontend
  annotations:
    kubernetes.io/change-cause: "moving to 1.29.7 latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
  template:
    metadata:
      name: nginx
      labels:
        project: roboshop
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:latest